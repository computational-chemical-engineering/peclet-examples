project:
  type: website
  output-dir: _site
  # Author in .qmd; the committed .ipynb copies exist only for the "Open in Colab"
  # buttons, so keep them out of the site render (they'd collide with index.html).
  render:
    - "index.qmd"
    - "examples/**/*.qmd"
    - "benchmarks/**/*.qmd"
    - "sanity-checks/**/*.qmd"
    - "STYLE_GUIDE.md"
    - "ISSUES.md"

website:
  title: "Peclet Examples"
  description: "Worked, runnable examples for the peclet simulation suite."
  site-url: "https://computational-chemical-engineering.github.io/peclet-examples"
  repo-url: "https://github.com/computational-chemical-engineering/peclet-examples"
  repo-actions: [source, issue]
  page-navigation: true
  navbar:
    logo: ""
    left:
      - href: index.qmd
        text: Home
      - text: "Single-phase flow"
        menu:
          - href: examples/poiseuille-ibm/index.qmd
            text: "Plane Poiseuille (cut-cell IBM, exact)"
          - href: examples/pipe-poiseuille/index.qmd
            text: "Pipe Poiseuille (curved wall, 2nd order)"
          - href: examples/taylor-green/index.qmd
            text: "Taylor–Green vortex"
          - href: examples/lid-driven-cavity/index.qmd
            text: "Lid-driven cavity (vs Ghia)"
          - href: examples/developing-channel/index.qmd
            text: "Developing channel (inflow/outflow)"
          - href: examples/backward-facing-step/index.qmd
            text: "Backward-facing step (separation)"
          - href: examples/cylinder-vortex-street/index.qmd
            text: "Cylinder vortex street (Schäfer–Turek)"
          - href: examples/rayleigh-benard/index.qmd
            text: "Rayleigh–Bénard convection (3-D, GPU)"
          - href: examples/wall-bounded-turbulence/index.qmd
            text: "Wall-bounded turbulence (DNS vs MKM, HPC)"
      - text: "Packings & porous"
        menu:
          - href: examples/zick-homsy/index.qmd
            text: "Zick–Homsy sphere arrays"
          - href: examples/random-packed-bed/index.qmd
            text: "Random packed bed (dem → flow)"
          - href: examples/ring-packed-bed/index.qmd
            text: "Ring packed-bed permeability (dem → flow)"
          - href: examples/pore-mesh-voronoi/index.qmd
            text: "Pore-space Voronoi mesh (dem → voro)"
      - text: "Granular (DEM)"
        menu:
          - href: examples/sdf-particle-packing/index.qmd
            text: "Custom-shaped particles (SDF)"
          - href: examples/rotating-drum/index.qmd
            text: "Rotating drum (moving SDF walls)"
          - href: examples/tumbling-cubes/index.qmd
            text: "Tumbling cubes (non-spherical, GPU)"
      - text: "CFD-DEM"
        menu:
          - href: examples/fluidized-bed/index.qmd
            text: "Fluidized bed (X-ray benchmark, 1M, GPU)"
          - href: examples/single-bubble-injection/index.qmd
            text: "Single-bubble injection (MRI, MFIX-Exa)"
          - href: examples/bidisperse-segregation/index.qmd
            text: "Bidisperse segregation (MFIX-Exa)"
          - href: examples/hcs-clustering/index.qmd
            text: "Homogeneous cooling & clustering (MFIX-Exa)"
      - text: "Validation"
        menu:
          - href: sanity-checks/index.qmd
            text: "DEM sanity checks (scorecard)"
          - href: benchmarks/index.qmd
            text: "Benchmarks (overview)"
          - href: benchmarks/staggered-vs-collocated/index.qmd
            text: "Staggered vs collocated (convergence)"
          - href: benchmarks/dem-bulk-dosta2024/index.qmd
            text: "DEM8 bulk benchmark (Dosta et al. 2024)"
    right:
      - icon: github
        href: "https://github.com/computational-chemical-engineering/peclet-examples"

format:
  html:
    theme: cosmo
    toc: true
    code-tools: true
    code-link: true
    highlight-style: github
    fig-cap-location: bottom

# Execute examples locally (or on a GPU runner), commit the cached outputs under
# _freeze/, and let the Pages CI *render only*. This keeps the public build free
# of any GPU / heavy-solver dependency. `quarto render` re-executes a page only
# when its source changes; force a refresh with `quarto render --execute`.
execute:
  freeze: auto

bibliography: references.bib
